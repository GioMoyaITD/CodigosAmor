<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes 2 - Quiz de Amor 🎯</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { nunito: ['Nunito', 'sans-serif'] } } }
        }
    </script>
    <style>
        /* Animación de vibración cuando se equivoca */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        /* Transiciones suaves */
        .fade-in { animation: fadeIn 0.5s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-pink-50 to-purple-100 h-[100dvh] w-full flex flex-col items-center justify-center font-nunito overflow-hidden touch-none selection:bg-transparent relative px-4">

    <div id="start-screen" class="flex flex-col items-center justify-center w-full max-w-sm z-10 text-center transition-all duration-500">
        <span class="text-8xl mb-6 drop-shadow-xl animate-bounce">🤔</span>
        <h1 class="text-4xl font-black bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent mb-4 leading-tight">El Quiz<br>Definitivo</h1>
        <p class="text-gray-600 font-medium mb-10 px-4">Vamos a ver qué tan buena memoria tienes, mi amor. ¡Son 5 preguntas!</p>
        <button id="start-btn" class="px-10 py-4 bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold text-lg rounded-full shadow-xl hover:scale-105 active:scale-95 transition-all duration-300">
            ¡Empezar a jugar! 🚀
        </button>
    </div>

    <div id="quiz-screen" class="hidden flex-col items-center justify-center w-full max-w-sm z-10 transition-all duration-500 w-full">
        <div class="w-full flex justify-between items-center mb-6 px-2">
            <span class="text-purple-500 font-bold text-sm uppercase tracking-wider">Pregunta <span id="current-q">1</span>/5</span>
            <span class="text-pink-500 font-bold text-sm uppercase tracking-wider">Puntos: <span id="score-display">0</span></span>
        </div>
        
        <div class="bg-white/90 backdrop-blur-sm p-6 rounded-3xl shadow-xl border border-white/50 w-full mb-8 text-center min-h-[120px] flex items-center justify-center">
            <h2 id="question-text" class="text-2xl font-black text-gray-800 leading-tight">Cargando...</h2>
        </div>

        <div id="options-container" class="flex flex-col w-full gap-3">
            </div>
    </div>

    <div id="result-screen" class="hidden flex-col items-center justify-center w-full max-w-sm z-10 text-center transition-all duration-500">
        <span id="result-emoji" class="text-8xl mb-4 drop-shadow-xl">🏆</span>
        <h1 class="text-4xl font-black bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent mb-2">¡Terminaste!</h1>
        <h2 class="text-2xl font-bold text-gray-700 mb-6">Puntuación: <span id="final-score" class="text-purple-600">0</span>/5</h2>
        
        <div class="bg-white/90 backdrop-blur-sm p-6 rounded-2xl shadow-xl border border-white/50 w-full mb-12">
            <p id="result-message" class="text-lg text-gray-700 font-medium leading-relaxed">Mensaje cargando...</p>
        </div>
    </div>

    <a href="index.html" id="back-btn" class="hidden absolute bottom-10 left-1/2 transform -translate-x-1/2 whitespace-nowrap px-8 py-3 bg-gradient-to-r from-gray-400 to-gray-500 text-white font-bold rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all duration-300 z-50">
        Volver a la colección
    </a>

    <script src="js/mes-02.js"></script>
</body>
</html>
